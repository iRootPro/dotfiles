scan_timeout = 100
command_timeout = 500

"$schema" = "https://starship.rs/config-schema.json"

follow_symlinks = false
add_newline = false

format = """
$directory\
${custom.giturl}\
$git_branch\
${custom.git_worktree}\
$git_status\
$line_break\
$character\
"""

right_format = """
$cmd_duration\
$golang\
$nodejs\
$python\
$rust\
$docker_context\
$terraform
"""

palette = "catppuccin_mocha"

# [fill]
# symbol = "'"

[directory]
style = "sapphire"
format = "[ $path ]($style)"
truncation_length = 4

