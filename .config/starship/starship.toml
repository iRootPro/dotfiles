[username]
disabled = true
show_always = true
style_user = "bg:surface0 fg:text"
style_root = "bg:surface0 fg:text"
format = " $user "

[line_break]
disabled = false

[character] 
disabled = false
success_symbol = "[ŌØ»](bold fg:green)"
error_symbol = "[ŌØ»](bold fg:red)"
vimcmd_symbol = "[ŌØ»](bold fg:yellow)"

[package]
disabled = false

[time]
disabled = true
time_format = "%R"
format = "[[ ’É║ $time ](fg:yellow bg:foam)]($style)"

[custom.giturl]
description = "Display symbol for remote Git server"
command = """
GIT_REMOTE=$(command git remote get-url origin 2> /dev/null)
case "$GIT_REMOTE" in
    *github*) GIT_REMOTE_SYMBOL="’Éł " ;;
    *gitlab*) GIT_REMOTE_SYMBOL="’Ŗ¢ " ;;
    *bitbucket*) GIT_REMOTE_SYMBOL="’ģ▒ " ;;
    *git*) GIT_REMOTE_SYMBOL="’×Ī " ;;
    *) GIT_REMOTE_SYMBOL="’ćÆ " ;;
esac
printf '%s ' "$GIT_REMOTE_SYMBOL"
"""
when = "git rev-parse --is-inside-work-tree 2> /dev/null"
format = "$output"
require_repo = true
ignore_timeout = true

[git_branch] 
symbol = "[ŅéČ](base)’Éś "
style = "fg:lavender bg:base"
format =  "  [$symbol$branch]($style)[Ņé┤](base)"

# [git_status] 
# MINIMAL git status 
# format = " [($all_status$ahead_behind )]($style)"
# ahead    = "ŌćĪ${count} "
# behind   = "ŌćŻ${count} "
# diverged = "ŌćĢŌćĪ${ahead_count}ŌćŻ${behind_count} "

[git_status]
format = "[$untracked$staged$modified$renamed$deleted$stashed$conflicted$ahead_behind]($style)"
# options available for format
staged     = "[+${count} ](green)"
modified   = "[!${count} ](yellow)"
renamed    = "[┬╗${count} ](blue)"
deleted    = "[-${count} ](red)"
untracked  = "[?${count} ](sapphire)"
stashed    = "[ŌēĪ${count} ](lavender)"
conflicted = "[Ō£¢${count} ](red bold)"

ahead      = "[ŌćĪ${count} ](teal)"
behind     = "[ŌćŻ${count} ](peach)"
diverged   = "[ŌćĢŌćĪ${ahead_count}ŌćŻ${behind_count} ](mauve)"

[custom.git_worktree]
description = "Show indicator when inside a git worktree"
command = """
if git rev-parse --git-dir >/dev/null 2>&1; then
      common_dir=$(git rev-parse --path-format=absolute --git-common-dir 2>/dev/null)
      git_dir=$(git rev-parse --path-format=absolute --git-dir 2>/dev/null)
      if [ "$common_dir" != "$git_dir" ]; then
            echo "Ōøō "
      fi
fi
"""
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
format = " ([$output ]($style))"
style = "bold green"
require_repo = true
ignore_timeout = true


