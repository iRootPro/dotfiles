# Terminal multiplexer
# https://github.com/tmux/tmux
# cSpell:words christoomey joshmedeski lazygit brightblack nobold gitmux catppuccin

set -g base-index 1
set -g detach-on-destroy off
set -g escape-time 0
set -s extended-keys on
set -g focus-events on
set -g history-limit 1000000
set -g mouse on
set -g renumber-windows on
set -s set-clipboard external
set -g status-interval 2
set -g status-left-length 200
set -g status-position top
set -g status-right ''
setw -g automatic-rename off
setw -g mode-keys vi
setw -g pane-base-index 1

set -g default-command ''
run-shell -b 'command -v fish >/dev/null 2>&1 && tmux set-option -g default-shell "$(command -v fish)"'

set -g default-terminal 'tmux-256color'
set -g terminal-features 'xterm*:RGB:clipboard:ccolour:cstyle:focus:title,screen*:title,rxvt*:ignorefkeys,kitty*:RGB:clipboard,alacritty*:RGB:clipboard,tmux-256color:RGB:clipboard,screen-256color:RGB'
set -g terminal-overrides ''
set -g allow-passthrough on

set -g message-command-style 'bg=#313244,fg=#f9e2af'
set -g message-style 'bg=#313244,fg=#f9e2af'
set -g mode-style 'bg=#313244,fg=#f9e2af'
set -g pane-active-border-style 'fg=#cba6f7,bg=default'
set -g pane-border-style 'fg=#45475a,bg=default'
set -g status-style 'bg=#1e1e2e,fg=#cdd6f4'
set -g window-status-separator ' '

if-shell 'command -v gitmux >/dev/null 2>&1' \
  "set -g status-left '#{?client_prefix,#[fg=#11111b,bg=#f9e2af,bold] PREFIX #[default] ,}#[fg=#89b4fa,bold]#S #[fg=#45475a]│ #[default]#[fg=#6c7086]#(gitmux -timeout 200ms -cfg $HOME/.config/tmux/gitmux.conf) '" \
  "set -g status-left '#{?client_prefix,#[fg=#11111b,bg=#f9e2af,bold] PREFIX #[default] ,}#[fg=#89b4fa,bold]#S #[fg=#45475a]│ #[default]'"

set -g window-status-current-format '#[fg=#11111b,bg=#cba6f7,bold] #I #[fg=#11111b,bg=#cba6f7]#{?#{automatic-rename},#{?#{&&:#{==:#{pane_current_command},node},#{&&:#{!=:#{pane_title},#{host}},#{!=:#{pane_title},#{host_short}}}},#{pane_title},#W},#W} #[default]'
set -g window-status-format '#[fg=#6c7086] #I #[fg=#a6adc8]#{?#{automatic-rename},#{?#{&&:#{==:#{pane_current_command},node},#{&&:#{!=:#{pane_title},#{host}},#{!=:#{pane_title},#{host_short}}}},#{pane_title},#W},#W} #[default]'

bind '%' split-window -c '#{pane_current_path}' -h
bind '"' split-window -c '#{pane_current_path}'
bind c   new-window -c '#{pane_current_path}'
bind 0   select-window -t :=10
bind g   new-window -n 'git' lazygit
bind h   select-pane -L
bind j   select-pane -D
bind k   select-pane -U
bind l   select-pane -R
bind N   command-prompt -I '#{b:pane_current_path}' -p 'New session' 'run-shell "$HOME/.config/tmux/scripts/tmux-new-session.sh \"%%\" \"#{pane_current_path}\""'
bind r   command-prompt -I '#W' "rename-window '%%'"
bind R   command-prompt -I '#S' "rename-session '%%'"
bind V   run-shell '$HOME/.config/tmux/scripts/tmux-window-picker.sh'
bind W   run-shell '$HOME/.config/tmux/scripts/tmux-smart-close.sh'
bind-key '{' swap-window -t -1 \; previous-window
bind-key '}' swap-window -t +1 \; next-window
bind-key x kill-pane

# Russian layout aliases for the same physical keys.
bind с   new-window -c '#{pane_current_path}'
bind п   new-window -n 'git' lazygit
bind р   select-pane -L
bind о   select-pane -D
bind л   select-pane -U
bind д   select-pane -R
bind Т   command-prompt -I '#{b:pane_current_path}' -p 'New session' 'run-shell "$HOME/.config/tmux/scripts/tmux-new-session.sh \"%%\" \"#{pane_current_path}\""'
bind к   command-prompt -I '#W' "rename-window '%%'"
bind К   command-prompt -I '#S' "rename-session '%%'"
bind М   run-shell '$HOME/.config/tmux/scripts/tmux-window-picker.sh'
bind Ц   run-shell '$HOME/.config/tmux/scripts/tmux-smart-close.sh'
bind-key ч kill-pane

bind-key -T copy-mode-vi 'C-\' select-pane -l
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'v'   send-keys -X begin-selection

set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL " --color=bg+:#313244,bg:#1e1e2e,spinner:#f5e0dc,hl:#89b4fa,fg:#cdd6f4,header:#6c7086,info:#6c7086,pointer:#cba6f7,marker:#a6e3a1,fg+:#cdd6f4,prompt:#89b4fa,hl+:#cba6f7,border:#45475a,label:#cba6f7'
set -g @fzf-url-history-limit '2000'
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'off'
set -g @tpm-update 'M-U'
set-environment -g TMUX_PLUGIN_MANAGER_PATH '$HOME/.config/tmux/plugins'

set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_text ' #W'
set -g @catppuccin_window_current_text ' #W'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'joshmedeski/tmux-fzf-url'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tpm'

if-shell -b '[ -f "$HOME/.config/tmux/plugins/tpm/tpm" ]' \
  'run "$HOME/.config/tmux/plugins/tpm/tpm"' \
  'display-message "TPM not installed; run ./install.sh or clone tmux-plugins/tpm"'

if-shell 'command -v gitmux >/dev/null 2>&1' \
  "set -g status-left '#{?client_prefix,#[fg=#11111b,bg=#f9e2af,bold] PREFIX #[default] ,}#[fg=#89b4fa,bold]#S #[fg=#45475a]│ #[default]#[fg=#6c7086]#(gitmux -timeout 200ms -cfg $HOME/.config/tmux/gitmux.conf) '" \
  "set -g status-left '#{?client_prefix,#[fg=#11111b,bg=#f9e2af,bold] PREFIX #[default] ,}#[fg=#89b4fa,bold]#S #[fg=#45475a]│ #[default]'"

set -g window-status-current-format '#[fg=#11111b,bg=#cba6f7,bold] #I #[fg=#11111b,bg=#cba6f7]#{?#{automatic-rename},#{?#{&&:#{==:#{pane_current_command},node},#{&&:#{!=:#{pane_title},#{host}},#{!=:#{pane_title},#{host_short}}}},#{pane_title},#W},#W} #[default]'
set -g window-status-format '#[fg=#6c7086] #I #[fg=#a6adc8]#{?#{automatic-rename},#{?#{&&:#{==:#{pane_current_command},node},#{&&:#{!=:#{pane_title},#{host}},#{!=:#{pane_title},#{host_short}}}},#{pane_title},#W},#W} #[default]'
set -g status-right ''

# Keep only tmux session manager keys by default. Pi dashboards are available
# as scripts, but intentionally not bound globally.
unbind -T prefix U
bind -T prefix Y run-shell '$HOME/.config/tmux/scripts/tmux-opencode-session-manager.sh launch "#{pane_current_path}" "#{window_id}"'
bind -T prefix Н run-shell '$HOME/.config/tmux/scripts/tmux-opencode-session-manager.sh launch "#{pane_current_path}" "#{window_id}"'
bind -T prefix U run-shell '$HOME/.config/tmux/scripts/tmux-opencode-session-manager.sh list'
bind -T prefix Г run-shell '$HOME/.config/tmux/scripts/tmux-opencode-session-manager.sh list'
bind -T prefix K run-shell '$HOME/.config/tmux/scripts/tmux-sesh-picker.sh'
bind -T prefix Л run-shell '$HOME/.config/tmux/scripts/tmux-sesh-picker.sh'
bind O run-shell '$HOME/.config/tmux/scripts/tmux-sesh-picker.sh'
bind Щ run-shell '$HOME/.config/tmux/scripts/tmux-sesh-picker.sh'
bind P run-shell '$HOME/.config/tmux/scripts/tmux-window-picker.sh'
bind З run-shell '$HOME/.config/tmux/scripts/tmux-window-picker.sh'
