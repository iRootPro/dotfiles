# Git in your tmux status bar
# https://github.com/arl/gitmux

tmux:
  symbols:
    branch: ' שׂ '
    hashprefix: ':'
    ahead: ' '
    behind: ' '
    staged: '都'
    conflict: '繁'
    untracked: ' '
    modified: ' '
    stashed: ' '
    clean: ''
    insertions: ' '
    deletions: ' '
  styles:
    state: '#[fg=#f38ba8,nobold]'
    branch: '#[fg=#cdd6f4,nobold]'
    staged: '#[fg=#a6e3a1,nobold]'
    conflict: '#[fg=#f38ba8,nobold]'
    modified: '#[fg=#f9e2af,nobold]'
    untracked: '#[fg=#6c7086,nobold]'
    stashed: '#[fg=#6c7086,nobold]'
    clean: '#[fg=#a6e3a1,nobold]'
    divergence: '#[fg=#94e2d5,nobold]'
  layout: [branch, divergence, ' ', flags, ' ', stats]
  options:
    branch_max_len: 0
