# Theme is managed by the BEGIN_KITTY_THEME block below.
# Shell
shell /opt/homebrew/bin/fish

# Font
font_family  MesloLGLDZ Nerd Font Mono
font_size    14.0

# Window
window_padding_width    4
hide_window_decorations yes
confirm_os_window_close 0
macos_option_as_alt     yes

# Cursor & Bell
cursor_shape     block
enable_audio_bell no

# Scrollback
scrollback_lines 10000

# Remote control (socket-only — безопаснее чем yes)
allow_remote_control socket-only
listen_on            unix:/tmp/kitty-{kitty_pid}

# tmux uses OSC 52 for clipboard sync; no-append avoids Kitty appending copies.
clipboard_control write-primary write-clipboard no-append

# Tab bar
tab_bar_edge          top
tab_bar_align         left
tab_bar_margin_height 0.0 4.0
tab_bar_style         powerline
tab_powerline_style   slanted
# Tmux owns tabs/windows; keep Kitty's native tab bar out of the way.
tab_bar_min_tabs      999
tab_title_template    "{activity_symbol} {index} {title}"

# Tabs
# Cmd+T creates a tmux window instead of a Kitty tab.
# Sends tmux default prefix Ctrl+B followed by `c`.
map --allow-fallback=shifted,ascii cmd+t send_text all \x02c
map --allow-fallback=shifted,ascii cmd+n send_text all \x02N
map --allow-fallback=shifted,ascii cmd+w send_text all \x02W
map --allow-fallback=shifted,ascii cmd+y send_text all \x02Y
map --allow-fallback=shifted,ascii cmd+u send_text all \x02U
map --allow-fallback=shifted,ascii cmd+o send_text all \x02O
map --allow-fallback=shifted,ascii cmd+shift+o send_text all \x02V
map --allow-fallback=shifted,ascii cmd+p send_text all \x02P
map --allow-fallback=shifted,ascii cmd+1 send_text all \x021
map --allow-fallback=shifted,ascii cmd+2 send_text all \x022
map --allow-fallback=shifted,ascii cmd+3 send_text all \x023
map --allow-fallback=shifted,ascii cmd+4 send_text all \x024
map --allow-fallback=shifted,ascii cmd+5 send_text all \x025
map --allow-fallback=shifted,ascii cmd+6 send_text all \x026
map --allow-fallback=shifted,ascii cmd+7 send_text all \x027
map --allow-fallback=shifted,ascii cmd+8 send_text all \x028
map --allow-fallback=shifted,ascii cmd+9 send_text all \x029
map --allow-fallback=shifted,ascii cmd+0 send_text all \x020
map --allow-fallback=shifted,ascii cmd+[ send_text all \x02p
map --allow-fallback=shifted,ascii cmd+] send_text all \x02n
map --allow-fallback=shifted,ascii cmd+shift+[ send_text all \x02\x7b
map --allow-fallback=shifted,ascii cmd+shift+] send_text all \x02\x7d
map --allow-fallback=shifted,ascii cmd+r send_text all \x02r
map --allow-fallback=shifted,ascii cmd+shift+r send_text all \x02R

# Splits
# Cmd+E: horizontal split (top/bottom), Cmd+Shift+E: vertical split (left/right)
map --allow-fallback=shifted,ascii cmd+e       send_text all \x02\x22
map --allow-fallback=shifted,ascii cmd+shift+e send_text all \x02\x25
map --allow-fallback=shifted,ascii cmd+h       neighboring_window left
map --allow-fallback=shifted,ascii cmd+l       neighboring_window right
map --allow-fallback=shifted,ascii cmd+k       send_text all \x02K
map --allow-fallback=shifted,ascii cmd+j       neighboring_window down

# Nvim save (Cmd+S -> :write)
map --allow-fallback=shifted,ascii cmd+s send_text all \x1b:write\r

# Shift+Enter -> Alt+Enter (для TUI)
map shift+enter send_text all \e\r


# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include current-theme.conf
# END_KITTY_THEME
