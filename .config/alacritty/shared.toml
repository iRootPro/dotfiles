[env]
TERM = "xterm-256color"

[terminal.shell]
program = "fish"

[window]
padding.x = 16
padding.y = 14
decorations = "None"
opacity = 0.98

[[keyboard.bindings]]
chars = "\u00021"
key = "Key1"
mods = "Command"

[[keyboard.bindings]]
chars = "\u00022"
key = "Key2"
mods = "Command"

[[keyboard.bindings]]
chars = "\u00023"
key = "Key3"
mods = "Command"

[[keyboard.bindings]]
chars = "\u00024"
key = "Key4"
mods = "Command"

[[keyboard.bindings]]
chars = "\u00025"
key = "Key5"
mods = "Command"

[[keyboard.bindings]]
chars = "\u00026"
key = "Key6"
mods = "Command"

[[keyboard.bindings]]
chars = "\u00027"
key = "Key7"
mods = "Command"

[[keyboard.bindings]]
chars = "\u00028"
key = "Key8"
mods = "Command"

[[keyboard.bindings]]
chars = "\u00029"
key = "Key9"
mods = "Command"

[[keyboard.bindings]]
chars = "\u00020"
key = "Key0"
mods = "Command"

[[keyboard.bindings]]
chars = "\u0002,"
key = "Comma"
mods = "Command"

[[keyboard.bindings]]
chars = """
:Commands
"""
key = "P"
mods = "Command|Shift"

[[keyboard.bindings]]
chars = "\u0002g"
key = "G"
mods = "Command"

[[keyboard.bindings]]
chars = "\u0002h"
key = "H"
mods = "Command"

[[keyboard.bindings]]
chars = "\u0002р"
key = "Р"
mods = "Command"

[[keyboard.bindings]]
chars = "\u0002k"
key = "K"
mods = "Command"

[[keyboard.bindings]]
chars = "\u0002л"
key = "Л"
mods = "Command"


[[keyboard.bindings]]
chars = "\u0002l"
key = "L"
mods = "Command"

[[keyboard.bindings]]
chars = "\u0002p"
key = "LBracket"
mods = "Command"

[[keyboard.bindings]]
chars = "\u0002{"
key = "LBracket"
mods = "Command|Shift"

[[keyboard.bindings]]
chars = "\u0002O"
key = "O"
mods = "Command"

[[keyboard.bindings]]
chars = "\u0002V"
key = "O"
mods = "Command|Shift"

[[keyboard.bindings]]
chars = "\u0002P"
key = "P"
mods = "Command"

[[keyboard.bindings]]
chars = "\u0002Y"
key = "Y"
mods = "Command"

[[keyboard.bindings]]
chars = "\u0002U"
key = "U"
mods = "Command"

[[keyboard.bindings]]
chars = "\u0002%"
key = "E"
mods = "Command|Shift"

[[keyboard.bindings]]
chars = "\u0002\""
key = "E"
mods = "Command"

[[keyboard.bindings]]
chars = "\u0002\""
key = "У"
mods = "Command"

[[keyboard.bindings]]
chars = """
:q
"""
key = "Q"
mods = "Command"

[[keyboard.bindings]]
chars = "\u0002n"
key = "RBracket"
mods = "Command"

[[keyboard.bindings]]
chars = "\u0002}"
key = "RBracket"
mods = "Command|Shift"

# Сохранение в neovim
[[keyboard.bindings]]
chars = """
:w
"""
key = "S"
mods = "Command"

[[keyboard.bindings]]
chars = """
:w
"""
key = "ы"
mods = "Command"

# Сохранить во всех буферах neovim
[[keyboard.bindings]]
chars = """
:wa
"""
key = "S"
mods = "Command|Shift"

[[keyboard.bindings]]
chars = """
:wa
"""
key = "ы"
mods = "Command|Shift"


[[keyboard.bindings]]
chars = "\u0002:"
key = "Semicolon"
mods = "Command"

[[keyboard.bindings]]
chars = "\u0002c"
key = "T"
mods = "Command"

[[keyboard.bindings]]
chars = "\u0002N"
key = "N"
mods = "Command"

[[keyboard.bindings]]
chars = "\u0002j"
key = "J"
mods = "Command"

[[keyboard.bindings]]
chars = "\u0002о"
key = "О"
mods = "Command"

[[keyboard.bindings]]
chars = "\u0002W"
key = "W"
mods = "Command"

[[keyboard.bindings]]
chars = "\u0002Ц"
key = "Ц"
mods = "Command"


[[keyboard.bindings]]
chars = "\u0002z"
key = "Z"
mods = "Command"


